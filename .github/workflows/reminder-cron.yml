name: Reminder Cron

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions' shortest practical interval is 5 minutes. This is the
    # free fallback for Vercel Hobby. Use cron-job.org or Vercel Pro for
    # closer-to-the-minute reminders.
    - cron: "*/5 * * * *"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger due reminder scan
        run: |
          curl --fail-with-body --retry 2 --retry-delay 10 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$PROD_URL/api/cron/notify"
        env:
          PROD_URL: ${{ vars.PROD_URL || 'https://life-os-nine-ruby.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
