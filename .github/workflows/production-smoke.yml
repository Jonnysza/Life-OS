name: Production Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run smoke:prod
        env:
          PROD_URL: ${{ vars.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
