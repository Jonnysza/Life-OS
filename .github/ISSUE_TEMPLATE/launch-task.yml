name: Launch task
description: Track work needed to ship Life OS.
title: "[Launch] "
labels: ["launch"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should be true when this is finished?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Define done
        - [ ] Implement
        - [ ] Verify locally
        - [ ] Verify on production
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Launch tier
      options:
        - Tier 1 - personal production
        - Tier 2 - public PWA
        - Tier 3 - app stores
        - Monetization
    validations:
      required: true
