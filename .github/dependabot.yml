version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      app-runtime:
        patterns:
          - next
          - react
          - react-dom
      ai-and-push:
        patterns:
          - "@anthropic-ai/*"
          - "@upstash/*"
          - web-push
